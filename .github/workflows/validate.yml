name: Validate Docker Image 🐳
permissions:
  contents: read
on:
  push:
    branches-ignore:
      - main
      - beta
  workflow_dispatch:
jobs:
  build:
    name: Build and Validate 🏁
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        game:
          [
            cstrike,
            cstrike-legacy,
            valve,
            valve-legacy,
            czero,
            czero-legacy,
            dmc,
            gearbox,
            ricochet,
            dod,
            tfc,
            tfc-legacy,
          ]
    env:
      GAME: ${{ matrix.game }}
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Set up Docker Buildx 🛠️
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image 🐳
        uses: docker/build-push-action@v6
        env:
          GAME: ${{ env.GAME }}
        with:
          context: ./container
          build-args: |
            GAME=${{ env.GAME }}
          load: true

      - name: Get Docker Image ID 🆔
        id: get_image_id
        run: echo "image_id=$(docker images -q | head -n 1)" >> $GITHUB_ENV

      - name: Add Custom Mod Content 📂
        run: |
          mkdir -p ./mods/decay
          touch ./mods/decay/plugin.ini

      - name: Add Configuration 📂
        run: |
          mkdir -p ./config/maps
          echo "custom-liblist" > ./config/liblist.gam
          echo "custom-mapcycle" > ./config/mapcycle.txt
          touch ./config/test.cfg
          touch ./config/maps/crazytank.bsp

      - name: Run Docker Container 🐳
        run: |
          declare -A MAPS
          MAPS[valve]=bounce
          MAPS[valve-legacy]=bounce
          MAPS[cstrike]=cs_italy
          MAPS[cstrike-legacy]=cs_italy
          MAPS[czero]=cs_italy
          MAPS[czero-legacy]=cs_italy
          MAPS[dmc]=dmc_dm2
          MAPS[gearbox]=op4_bootcamp
          MAPS[ricochet]=rc_arena
          MAPS[dod]=dod_anzio
          MAPS[tfc]=2fort
          MAPS[tfc-legacy]=2fort

          START_MAP=${MAPS[${{ matrix.game }}]}

          docker run -d -ti \
            --name hlds-${{ matrix.game }} \
            -v "./config:/temp/config" \
            -v "./mods:/temp/mods" \
            -p 27015:27015/udp \
            -p 27015:27015 \
            -p 26900:26900/udp \
            -e GAME=${{ matrix.game }} \
            ${{ env.image_id }} \
            "+log on +rcon_password changeme +maxplayers 12 +map $START_MAP"

      - name: Validate Directory Mappings 📂
        run: |
          GAME_DIR=/opt/steam/hlds/${{ matrix.game }}
          # Check if plugin.ini exists in the decay directory
          if [ "$(docker exec hlds-${{ matrix.game }} ls /opt/steam/hlds/decay | grep -c 'plugin.ini')" -eq 0 ]; then
            echo "plugin.ini file is missing in the decay directory!"
            exit 1
          fi
          # Check if test.cfg exists in the game directory
          if [ "$(docker exec hlds-${{ matrix.game }} ls $GAME_DIR | grep -c 'test.cfg')" -eq 0 ]; then
            echo "test.cfg file is missing in the $GAME_DIR directory!"
            exit 1
          fi
          # Check if crazytank.bsp exists in the maps directory
          if [ "$(docker exec hlds-${{ matrix.game }} ls $GAME_DIR/maps | grep -c 'crazytank.bsp')" -eq 0 ]; then
            echo "crazytank.bsp file is missing in the $GAME_DIR/maps directory!"
            exit 1
          fi
          # Check that liblist.gam was overwritten (if present)
          if docker exec hlds-${{ matrix.game }} test -f $GAME_DIR/liblist.gam; then
            LIBLIST_CONTENT=$(docker exec hlds-${{ matrix.game }} cat $GAME_DIR/liblist.gam)
            if [ "$LIBLIST_CONTENT" != "custom-liblist" ]; then
              echo "liblist.gam was not overwritten!"
              exit 1
            fi
          fi
          # Check that mapcycle.txt was overwritten (if present)
          if docker exec hlds-${{ matrix.game }} test -f $GAME_DIR/mapcycle.txt; then
            MAPCYCLE_CONTENT=$(docker exec hlds-${{ matrix.game }} cat $GAME_DIR/mapcycle.txt)
            if [ "$MAPCYCLE_CONTENT" != "custom-mapcycle" ]; then
              echo "mapcycle.txt was not overwritten!"
              exit 1
            fi
          fi
          echo "All config and mod file mappings work as expected!"

      - name: Validate Game Data Is Available 📂
        run: |
          GAME_NAME=$(echo "${{ matrix.game }}" | sed 's/-legacy//')
          if [ "$(docker exec hlds-${{ matrix.game }} ls /opt/steam/hlds | grep -c "$GAME_NAME")" -eq 0 ]; then
            echo "$GAME_NAME directory is missing!"
            exit 1
          fi

      - name: Cleanup 🧹
        if: always()
        run: |
          docker stop hlds-${{ matrix.game }} || true
          docker rm hlds-${{ matrix.game }} || true
          docker system prune --all --force
