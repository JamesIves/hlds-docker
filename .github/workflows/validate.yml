name: Validate Docker Image 🐳
permissions:
  contents: read
on:
  push:
    branches-ignore:
      - main
      - beta
  workflow_dispatch:
jobs:
  build:
    name: Build and Validate 🏁
    runs-on: ubuntu-latest
    concurrency: ci-${{ github.ref }}
    strategy:
      matrix:
        game: [cstrike, gearbox]
    env:
      GAME: ${{ matrix.game }}
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Set up Docker Buildx 🛠️
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image 🐳
        uses: docker/build-push-action@v6
        env:
          GAME: ${{ env.GAME }}
        with:
          context: ./container
          build-args: |
            GAME=${{ env.GAME }}
          load: true

      - name: Get Docker Image ID 🆔
        id: get_image_id
        run: echo "image_id=$(docker images -q | head -n 1)" >> $GITHUB_ENV

      - name: Add Custom Mod Content 📂
        run: |
          mkdir -p ./mods/decay
          touch ./mods/decay/plugin.ini


      - name: Add Configuration 📂
        run: |
          mkdir -p ./config
          if [ "${{ matrix.game }}" = "gearbox" ]; then
            echo "custom-liblist" > ./config/liblist.gam
            echo "custom-mapcycle" > ./config/mapcycle.txt
          else
            mkdir -p ./config/maps
            touch ./config/test.cfg
            touch ./config/maps/crazytank.bsp
          fi


      - name: Run Docker Container 🐳
        run: |
          if [ "${{ matrix.game }}" = "gearbox" ]; then
            docker run -d -ti \
              --name hlds-${{ matrix.game }} \
              -v "$PWD/config:/temp/config" \
              -p 27017:27015/udp \
              -e GAME=gearbox \
              ${{ env.image_id }} \
              "+log on +rcon_password changeme +maxplayers 12 +map op4_bootcamp"
          else
            docker run -d -ti \
              --name hlds-${{ matrix.game }} \
              -v "$PWD/config:/temp/config" \
              -v "$PWD/mods:/temp/mods" \
              -p 27015:27015/udp \
              -p 27015:27015 \
              -p 26900:26900/udp \
              -e GAME=${{ matrix.game }} \
              ${{ env.image_id }} \
              "+log on +rcon_password changeme +maxplayers 12 +map cs_italy"
          fi


      - name: Validate Directory Mappings 📂
        run: |
          if [ "${{ matrix.game }}" = "gearbox" ]; then
            # Check that liblist.gam was overwritten
            LIBLIST_CONTENT=$(docker exec hlds-gearbox cat /opt/steam/hlds/gearbox/liblist.gam)
            if [ "$LIBLIST_CONTENT" != "custom-liblist" ]; then
              echo "liblist.gam was not overwritten!"
              exit 1
            fi
            # Check that mapcycle.txt was overwritten
            MAPCYCLE_CONTENT=$(docker exec hlds-gearbox cat /opt/steam/hlds/gearbox/mapcycle.txt)
            if [ "$MAPCYCLE_CONTENT" != "custom-mapcycle" ]; then
              echo "mapcycle.txt was not overwritten!"
              exit 1
            fi
            echo "Gearbox config file mappings work as expected!"
          else
            # Check if plugin.ini exists in the decay directory
            if [ "$(docker exec hlds-cstrike ls /opt/steam/hlds/decay | grep -c 'plugin.ini')" -eq 0 ]; then
              echo "plugin.ini file is missing in the decay directory!"
              exit 1
            fi
            # Check if test.cfg exists in the game directory
            if [ "$(docker exec hlds-cstrike ls /opt/steam/hlds/cstrike | grep -c 'test.cfg')" -eq 0 ]; then
              echo "test.cfg file is missing in the cstrike directory!"
              exit 1
            fi
            # Check if crazytank.bsp exists in the maps directory
            if [ "$(docker exec hlds-cstrike ls /opt/steam/hlds/cstrike/maps | grep -c 'crazytank.bsp')" -eq 0 ]; then
              echo "crazytank.bsp file is missing in the maps directory!"
              exit 1
            fi
            echo "Volume mappings work as expected!"
          fi


      - name: Validate Game Data Is Available 📂
        run: |
          GAME_NAME=$(echo "${{ matrix.game }}" | sed 's/-legacy//')
          if [ "$(docker exec hlds-${{ matrix.game }} ls /opt/steam/hlds | grep -c "$GAME_NAME")" -eq 0 ]; then
            echo "$GAME_NAME directory is missing!"
            exit 1
          fi


      - name: Cleanup 🧹
        if: always()
        run: |
          docker stop hlds-${{ matrix.game }} || true
          docker rm hlds-${{ matrix.game }} || true
          docker system prune --all --force
